<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SWYMBLE</title>
    <script>
      (function () {
        var segmentCount = 0;
        var location = window.location;
        var redirect =
          location.protocol +
          '//' +
          location.hostname +
          (location.port ? ':' + location.port : '') +
          location.pathname
            .split('/')
            .slice(0, 1 + segmentCount)
            .join('/') +
          '/?/' +
          location.pathname
            .slice(1)
            .split('/')
            .slice(segmentCount)
            .join('/')
            .replace(/&/g, '~and~') +
          (location.search ? '&' + location.search.slice(1).replace(/&/g, '~and~') : '') +
          location.hash;

        location.replace(redirect);
      })();
    </script>
  </head>
  <body></body>
</html>

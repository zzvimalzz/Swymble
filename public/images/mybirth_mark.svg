<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">MyBirth mark</title>
  <desc id="desc">A moonlit birth archive mark with a star, orbit line, and deep-space backdrop.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0" stop-color="#1b1830"/>
      <stop offset="0.55" stop-color="#080914"/>
      <stop offset="1" stop-color="#03040a"/>
    </radialGradient>
    <radialGradient id="moon" cx="34%" cy="28%" r="72%">
      <stop offset="0" stop-color="#fff8df"/>
      <stop offset="0.42" stop-color="#d9c690"/>
      <stop offset="0.72" stop-color="#8d7f68"/>
      <stop offset="1" stop-color="#42394a"/>
    </radialGradient>
    <linearGradient id="orbit" x1="168" x2="1010" y1="620" y2="182" gradientUnits="userSpaceOnUse">
      <stop stop-color="#74e3d0" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#74e3d0"/>
      <stop offset="1" stop-color="#e8c77e" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feColorMatrix in="blur" values="0 0 0 0 0.45 0 0 0 0 0.89 0 0 0 0 0.82 0 0 0 0.55 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <g opacity="0.72">
    <circle cx="160" cy="116" r="3" fill="#f4ead2"/>
    <circle cx="284" cy="228" r="2" fill="#74e3d0"/>
    <circle cx="954" cy="148" r="3" fill="#f4ead2"/>
    <circle cx="1040" cy="406" r="2" fill="#e8c77e"/>
    <circle cx="850" cy="612" r="2" fill="#f4ead2"/>
    <circle cx="222" cy="634" r="2" fill="#e8c77e"/>
  </g>
  <ellipse cx="590" cy="420" rx="420" ry="154" fill="none" stroke="url(#orbit)" stroke-width="5" transform="rotate(-18 590 420)"/>
  <circle cx="602" cy="360" r="166" fill="url(#moon)" filter="url(#softGlow)"/>
  <circle cx="538" cy="306" r="18" fill="#665b69" opacity="0.38"/>
  <circle cx="658" cy="256" r="26" fill="#665b69" opacity="0.28"/>
  <circle cx="698" cy="398" r="16" fill="#2d2939" opacity="0.28"/>
  <circle cx="556" cy="442" r="28" fill="#2d2939" opacity="0.22"/>
  <path d="M602 142c52 44 84 116 84 218s-32 174-84 218c116 0 210-98 210-218s-94-218-210-218Z" fill="#05060c" opacity="0.52"/>
  <path d="M906 226 940 304l80 32-80 32-34 78-34-78-80-32 80-32 34-78Z" fill="#e8c77e"/>
  <path d="M906 274 924 318l46 18-46 18-18 44-18-44-46-18 46-18 18-44Z" fill="#fff8df"/>
  <text x="600" y="660" fill="#f7f1df" font-family="Space Grotesk, Arial, sans-serif" font-size="82" font-weight="700" text-anchor="middle" letter-spacing="0">MyBirth</text>
  <text x="600" y="708" fill="#9ca3b6" font-family="Space Grotesk, Arial, sans-serif" font-size="25" text-anchor="middle" letter-spacing="6">THE DAY YOU ARRIVED</text>
</svg>

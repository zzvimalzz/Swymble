# Wrangler config for the WatchPaintDry domain-routing Worker.
# Deploy from the repo root:
#   npx wrangler deploy --config cloudflare/watchpaintdry-worker.wrangler.toml
#
# `workers_dev = true` keeps the watchpaintdry-site.zzvimalzz.workers.dev preview URL live
# (the Worker serves content there instead of redirecting, see the worker source).
name = "watchpaintdry-site"
main = "watchpaintdry-worker.js"
compatibility_date = "2026-07-01"
workers_dev = true

# Zone routes for the live site (same pattern as the mybirth/what2watch workers). The zone's
# existing proxied DNS records (which point at the old GitHub Pages deployment) stay in place —
# the Worker intercepts every request before they matter. Custom domains were tried first but
# Cloudflare refuses them while those records exist (API error 100117); routes work alongside
# them, which also means deleting the Worker cleanly falls back to the old deployment.
routes = [
  { pattern = "watchpaintdry.net/*", zone_name = "watchpaintdry.net" },
  { pattern = "www.watchpaintdry.net/*", zone_name = "watchpaintdry.net" },
]

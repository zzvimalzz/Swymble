# Wrangler config for the Swymble contact form worker.
#
# This is optional — the worker (contact-worker.js) can also be pasted
# directly into the Cloudflare dashboard's Workers "Quick edit" editor,
# matching how the other workers in this folder (mybirth-subdomain-worker.js,
# what2watch-subdomain-worker.js) are deployed. Use this file if you'd rather
# deploy with the wrangler CLI.
#
# Deploy with:
#   wrangler deploy --config cloudflare/contact-worker.wrangler.toml
#
# One-time setup before the first deploy:
#   1. wrangler kv namespace create CONTACT_KV
#        -> paste the returned "id" into the [[kv_namespaces]] block below.
#   2. In the Cloudflare dashboard, enable Email Routing on the swymble.com
#      zone and verify your actual destination mailbox
#      (Email -> Email Routing -> Destination Addresses). This is typically
#      a plain external mailbox, not a swymble.com alias — a hello@swymble.com
#      -style address with only a routing rule pointing at it does NOT count
#      as verified for a send_email binding's destination. This step cannot
#      be done via wrangler/this file.
#   3. Fill in CONTACT_TO / CONTACT_FROM / CONTACT_DELIVER_TO under [vars]
#      below (or use `wrangler secret put` instead if you'd rather not commit
#      them here — none of the three is actually sensitive). CONTACT_FROM
#      must be an address on the swymble.com domain; CONTACT_DELIVER_TO must
#      be the verified destination address from step 2 (the actual delivery
#      target — CONTACT_TO is cosmetic only, it just sets the "To:" header
#      shown in the email body).
#
# `wrangler deploy` will publish the worker AND attach the [[routes]] entry
# below to the swymble.com zone automatically. Because the site itself is
# static and hosted on GitHub Pages (fronted by Cloudflare DNS/proxy), this
# Worker route on swymble.com/api/* intercepts matching requests at
# Cloudflare's edge before they would ever reach GitHub Pages — that's the
# intended architecture, no GitHub Pages config changes are needed.

name = "swymble-contact"
main = "contact-worker.js"
compatibility_date = "2024-09-23"

[[routes]]
pattern = "swymble.com/api/contact*"
zone_name = "swymble.com"

[[kv_namespaces]]
binding = "CONTACT_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID" # from `wrangler kv namespace create CONTACT_KV`

[[send_email]]
name = "CONTACT_EMAIL"
destination_address = "REPLACE_WITH_VERIFIED_DESTINATION_ADDRESS" # must match a verified Email Routing destination address (Email -> Email Routing -> Destination Addresses), not just a swymble.com alias with a routing rule

[vars]
CONTACT_TO = "hello@swymble.com" # cosmetic "To:" header only
CONTACT_FROM = "contact@swymble.com" # must be on the swymble.com domain
CONTACT_DELIVER_TO = "REPLACE_WITH_VERIFIED_DESTINATION_ADDRESS" # must match the send_email binding's destination_address above

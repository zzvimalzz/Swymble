<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/png" sizes="1254x1254" href="/images/what2watch_logo.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>what2watch — Lost in the algorithm? Get lost in this instead.</title>
    <meta name="description" content="A living wall of movies and shows, packed into a single screen. Explore tens of thousands of films in an interactive force-directed voronoi diagram. A Swymble Labs experiment." />
    <meta name="keywords" content="movies, films, discovery, visualization, interactive, WebGL, cinema, voronoi, force-directed graph, what2watch, swymble labs" />
    <meta name="author" content="Swymble Labs" />
    <link rel="canonical" href="https://what2watch.swymble.com/" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="what2watch — Lost in the algorithm? Get lost in this instead." />
    <meta property="og:description" content="A living wall of movies and shows, packed into a single screen. Explore tens of thousands of films in an interactive force-directed voronoi diagram." />
    <meta property="og:url" content="https://what2watch.swymble.com/" />

    <meta property="og:image:alt" content="Interactive movie discovery visualization interface" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="what2watch — Lost in the algorithm? Get lost in this instead." />
    <meta name="twitter:description" content="A living wall of movies and shows, packed into a single screen. Explore tens of thousands of films in an interactive force-directed voronoi diagram." />
    <meta name="twitter:image" content="https://what2watch.swymble.com/og.jpg" />

    <!-- Additional Meta -->
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="what2watch" />
    
    <!-- Robots -->
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- Inline (no external stylesheet/JS dependency) so the dark background
         and boot loader paint immediately, before the app bundle - which
         includes the WebGL engine - has downloaded and parsed. Removed by
         app/cmps/views/intro/intro.tsx once the real landing screen mounts. -->
    <style>
      html, body {
        background: #0a0a0a;
        margin: 0;
      }
      #boot-loader {
        position: fixed;
        inset: 0;
        z-index: 999999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: #0a0a0a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      #boot-loader .w2w-boot-spinner {
        height: 15px;
        aspect-ratio: 4;
        --_g: no-repeat radial-gradient(farthest-side, #f3bd35 90%, #f3bd35);
        background: var(--_g) left, var(--_g) right;
        background-size: 25% 100%;
        display: grid;
      }
      #boot-loader .w2w-boot-spinner::before,
      #boot-loader .w2w-boot-spinner::after {
        content: "";
        height: inherit;
        aspect-ratio: 1;
        grid-area: 1/1;
        margin: auto;
        border-radius: 50%;
        transform-origin: -100% 50%;
        background: #f3bd35;
        animation: w2w-boot-orbit 1s infinite linear;
      }
      #boot-loader .w2w-boot-spinner::after {
        transform-origin: 200% 50%;
        animation-delay: -0.5s;
      }
      @keyframes w2w-boot-orbit {
        58%, 100% { transform: rotate(1turn); }
      }
      #boot-loader span {
        font-size: 0.75rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.4);
      }
    </style>
  </head>
  <body class="bg-background">
    <div id="boot-loader" aria-hidden="true">
      <div class="w2w-boot-spinner"></div>
      <span>Loading</span>
    </div>
    <script>
      // Safety net: the app removes #boot-loader itself once it has
      // something to show. If that never happens (an uncaught error before
      // React mounts, a slow/broken network), don't leave visitors staring
      // at a spinner forever - surface whatever did load underneath.
      setTimeout(function () {
        var el = document.getElementById('boot-loader')
        if (el) el.remove()
      }, 20000)
    </script>
    <div id="root"></div>
    <div
      id="voroforce"
      class="pointer-events-auto fixed inset-x-0 top-0 h-dvh w-screen"
    >
      <canvas class="h-full w-full pointer-events-none"></canvas>
    </div>
    <script type="module" src="/app/main.tsx"></script>
  </body>
</html>

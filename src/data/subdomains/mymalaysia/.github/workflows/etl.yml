# Scheduled data ingestion: downloads every dataset from its official
# source, validates + transforms it, and opens a reviewable PR with the
# refreshed artifacts. Merging the PR deploys the new data (deploy.yml).
#
# R2 mirroring is gated on the ENABLE_R2_UPLOAD repo variable (needs
# CLOUDFLARE_API_TOKEN with R2 write + CLOUDFLARE_ACCOUNT_ID secrets).
name: ETL

on:
  schedule:
    # Weekly, Monday 01:00 UTC (09:00 MYT) — fuel prices update Thursdays,
    # statistical series monthly/annually; weekly keeps everything within
    # its staleness window without hammering upstream.
    - cron: "0 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build geo artifacts
        run: npm run etl:geo

      - name: Run tabular pipeline
        run: npm run etl

      - name: Build transit network artifacts (GTFS Static)
        run: npm run etl:gtfs

      - name: Unit tests (transforms + registry still hold)
        run: npm test

      - name: Mirror artifacts to R2
        if: ${{ vars.ENABLE_R2_UPLOAD == 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node etl/upload-r2.mjs

      - name: Open data-update PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: etl/data-refresh
          commit-message: "data: scheduled artifact refresh"
          title: "Data refresh (scheduled ETL)"
          body: |
            Automated artifact refresh from official sources. Review the
            diff for anomalies (row-count collapses, unexpected vintages)
            before merging — merging deploys the new data.
          add-paths: |
            public/data/**
            public/maps/**
            src/maps/generated/**
            src/features/home/geometry/**

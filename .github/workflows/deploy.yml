name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            src/data/subdomains/mybirth/package-lock.json
            src/data/subdomains/what2watch/package-lock.json
            src/data/subdomains/malaysiahub/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install MyBirth dependencies
        run: npm ci --prefix src/data/subdomains/mybirth

      - name: Install what2watch dependencies
        run: npm ci --prefix src/data/subdomains/what2watch

      - name: Install MalaysiaHub dependencies
        run: npm ci --prefix src/data/subdomains/malaysiahub

      - name: Run data-integrity tests
        run: npm test

      - name: Build site
        run: npm run build

      # Report-only Lighthouse audit of the built pages (results land in the job log with a
      # temporary public report URL). continue-on-error keeps flaky runners from blocking deploys.
      - name: Lighthouse audit
        uses: treosh/lighthouse-ci-action@v12
        continue-on-error: true
        with:
          configPath: .lighthouserc.json
          uploadArtifacts: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
